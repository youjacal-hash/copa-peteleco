<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa Peteleco 2026 🏆</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#f59e0b', 600: '#d97706', 400: '#fbbf24' },
            dark: { 900: '#0a0a0f', 800: '#111118', 700: '#1a1a25', 600: '#242433', 500: '#2e2e42' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0a0a0f; }
    .tab-btn.active { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.08); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .flag-img { border-radius: 3px; display: inline-block; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    .score-input {
      width: 3rem; text-align: center;
      background: #1a1a25; border: 1px solid #2e2e42;
      color: #fff; border-radius: 0.5rem; padding: 0.4rem;
      font-size: 1.1rem; font-weight: 700;
    }
    .score-input:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,0.2); }
    .score-input:disabled { opacity: 0.4; cursor: not-allowed; background: #111118; }
    .flash-msg { animation: slideDown 0.3s ease; }
    @keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2e2e42; border-radius: 3px; }
  </style>
</head>
<body class="dark text-gray-100 min-h-screen">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="fixed top-4 right-4 z-50 space-y-2 max-w-xs">
        {% for category, message in messages %}
          <div class="flash-msg px-4 py-3 rounded-lg text-sm font-medium shadow-lg
            {% if category == 'success' %}bg-green-600/90 text-white{% else %}bg-red-600/90 text-white{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
      <script>setTimeout(() => document.querySelectorAll('.flash-msg').forEach(el => el.remove()), 3500);</script>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

</body>
</html>
