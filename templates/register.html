{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⚽</div>
      <h1 class="text-3xl font-black tracking-tight text-white">Copa Peteleco</h1>
      <p class="text-brand-400 font-semibold text-lg mt-1">2026</p>
      <p class="text-gray-400 text-sm mt-2">Crie sua conta e comece a palpitar!</p>
    </div>

    <div class="bg-dark-700 rounded-2xl p-8 border border-dark-500 shadow-2xl">
      <h2 class="text-xl font-bold text-white mb-6">Criar Conta</h2>
      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Nome de usuário</label>
          <input type="text" name="username" required autocomplete="username"
            class="w-full px-4 py-3 rounded-xl bg-dark-600 border border-dark-500 text-white placeholder-gray-500
                   focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition"
            placeholder="Escolha um nome único" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Senha</label>
          <input type="password" name="password" required autocomplete="new-password"
            class="w-full px-4 py-3 rounded-xl bg-dark-600 border border-dark-500 text-white placeholder-gray-500
                   focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition"
            placeholder="Crie uma senha" />
        </div>
        <button type="submit"
          class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-dark-900 font-bold rounded-xl transition mt-2 text-base">
          Criar conta e entrar
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-5">
        Já tem conta?
        <a href="{{ url_for('login') }}" class="text-brand-400 hover:text-brand-500 font-semibold transition">Entrar</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
