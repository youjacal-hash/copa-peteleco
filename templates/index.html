{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="bg-dark-700 rounded-2xl border border-dark-500 p-6 sm:p-8 w-full max-w-md shadow-2xl text-center space-y-6">
    
    <div>
      <span class="text-4xl">🔒</span>
      <h2 class="text-xl font-black text-white mt-3">Área Restrita</h2>
      <p class="text-xs text-gray-500 mt-1">Insira a senha mestra para gerenciar a Copa Peteleco</p>
    </div>

    {% if error %}
      <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-semibold py-2.5 px-3 rounded-xl">
        ⚠️ {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin') }}" class="space-y-4">
      <input type="hidden" name="action" value="admin_login" />
      
      <div>
        <input type="password" name="admin_password" required autofocus
          placeholder="Digite a senha do administrador" 
          class="w-full px-4 py-3 bg-dark-800 border border-dark-600 rounded-xl text-white text-center font-bold placeholder-gray-600 focus:outline-none focus:border-brand-400 transition" />
      </div>

      <button type="submit" 
        class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-dark-900 font-bold rounded-xl transition shadow-lg text-sm">
        Entrar no Painel
      </button>
    </form>

    <a href="{{ url_for('index') }}" class="inline-block text-xs text-gray-500 hover:text-gray-400 transition">
      ← Voltar para os Palpites
    </a>

  </div>
</div>
{% endblock %}
